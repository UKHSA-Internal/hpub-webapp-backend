name: Black Formatter Check with ReviewDog

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  black-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set environment variables
        run: |
          echo "REPORTER=${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Black
        run: pip install black==23.1.0

      - name: Run Black with ReviewDog
        uses: reviewdog/action-black@v3
        with:
#          black_args: "--check"
          reporter: ${{ env.REPORTER }}
          filter_mode: nofilter
          workdir: backend_alpha
          github_token: ${{ secrets.GITHUB_TOKEN }}

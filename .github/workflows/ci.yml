name: Python formatting

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
      - develop
      

jobs:
  backend-test:
    runs-on: ubuntu-latest
   
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Install uv
      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      # Initialize backend project as a uv project
      #- name: Initialize uv project
       # working-directory: hpub-backend/backend_alpha
        #run: uv init .
       
      # Install dependencies
      - name: Install dependencies
        working-directory: backend_alpha
        run: |
          uv add -r requirements.txt
          uv add pytest pytest-cov scikit-learn
          uv run black .  # Formatting with Black
          uv run isort .  # Sorting imports



name: Black Formatter Check with ReviewDog

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  black-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install black
          pip install reviewdog

      - name: Run Black and ReviewDog
        run: |
          black --check --diff . | reviewdog -efm="%f:%l:%c: %m" -name="black" -reporter=github-pr-check -level=warning

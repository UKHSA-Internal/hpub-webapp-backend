name: Build, Release & Deploy

on:
  pull_request:
  push:
    branches:
      - "main-ramon"
      - "production-ramon"
      - RITM0194581-image-prefix

env:
  APP_NAME: ${{ vars.APP_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_NAMESPACE: ${{ vars.ECR_NAMESPACE }}
  RUN_UNIT_TESTS: ${{ vars.RUN_UNIT_TESTS }}

jobs:
  build:
    name: Build and test container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        if: ${{ env.RUN_UNIT_TESTS == 'true' }}
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: health_pubs/requirements.txt
        
      - name: Install dependencies
        if: ${{ env.RUN_UNIT_TESTS == 'true' }}
        working-directory: health_pubs
        run: pip install -r requirements.txt
        
      - name: Unit tests
        if: ${{ env.RUN_UNIT_TESTS == 'true' }}
        working-directory: health_pubs
        run: pytest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: build-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build container image
        uses: docker/build-push-action@v5
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          context: .
          # FIXED: Pushes on any 'push' event so that subsequent Release/Hotfix jobs can pull the image
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:latest
          cache-to: type=inline

  release:
    name: Tag and release container image
    runs-on: ubuntu-latest
    # FIXED: Added 'main' to triggers at the top to make this job reachable
    if: github.ref == 'refs/heads/main-ramon' && github.event_name == 'push'
    environment: dev
    permissions:
      contents: write
      id-token: write
      actions: read
    needs: build
    outputs:
      release_tag: ${{ steps.tag_bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: ukhsa-collaboration/devops-github-actions/.github/actions/github-bump-tag@v0.8.0
        id: tag_bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_ECR_REGISTRY }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: retag-image-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull, retag, and push Application image for release
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          NEW_TAG: ${{ steps.tag_bump.outputs.new_tag }}
        run: |
          docker pull $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$IMAGE_TAG $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$NEW_TAG
          docker tag $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$IMAGE_TAG $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:latest
          docker push $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$NEW_TAG
          docker push $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:latest
  
  release-hotfix:
    name: Hotfix Tag and release container image 
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/production-ramon' && contains(github.event.head_commit.message, 'hotfix/HPUB')
    environment: dev
    permissions:
      contents: write
      id-token: write
      actions: read
    needs: build
    outputs:
      hotfix_tag: ${{ env.HOTFIX_TAG }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      
      - name: Get latest GitHub release and calculate hotfix tag
        id: latest_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          LATEST_RELEASE_TAG=$(curl -s -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/$REPO/releases/latest \
            | jq -r '.tag_name')

          VERSION_NUMBER=${LATEST_RELEASE_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NUMBER"
          
          git fetch --tags > /dev/null 2>&1
          LATEST_PATCH=$(git tag -l "v${MAJOR}.${MINOR}.*" | sed "s/v${MAJOR}.${MINOR}.//" | sort -n | tail -1)
          LATEST_PATCH=${LATEST_PATCH:-0}
          PATCH=$((LATEST_PATCH + 1))

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "HOTFIX_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "HOTFIX_TAG=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_ECR_REGISTRY }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: retag-image-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Setup Git & Push Tag
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git tag -a $HOTFIX_TAG -m "Hotfix: $HOTFIX_TAG"
          git push origin $HOTFIX_TAG

      - name: Pull, retag, and push Application image for hotfix
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker pull $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$IMAGE_TAG $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$HOTFIX_TAG
          docker tag $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$IMAGE_TAG $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:latest
          docker push $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$HOTFIX_TAG
          docker push $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:latest

  deploy_to_nonprod:
    name: Deploy build to ${{ matrix.environment }}
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    strategy:
      max-parallel: 1
      matrix:
        environment: ["dev", "test"]
    # FIXED: Logic to run if either standard release OR hotfix succeeds
    if: |
      always() &&
      (needs.release.result == 'success' || needs.release-hotfix.result == 'success') &&
      github.event_name == 'push'
    permissions:
      contents: write
      id-token: write
      actions: read
    needs:
      - release
      - release-hotfix
    steps:
      - name: Determine Deployment Tag
        id: deploy_vars
        run: |
          if [ "${{ needs.release.result }}" == "success" ]; then
            echo "tag=${{ needs.release.outputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ needs.release-hotfix.outputs.hotfix_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Parameter Store with new value
        run: |
          aws ssm put-parameter --name "/hpub/$APP_NAME/image_tag" --type "String" --value "${{ steps.deploy_vars.outputs.tag }}" --overwrite

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition aw-hpub-euw2-${{ matrix.environment }}-ecssvc-$APP_NAME --query taskDefinition > task-definition.json

      - name: Modify Amazon ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ secrets.AWS_ACCOUNT_ID_ECR_REGISTRY }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:${{ steps.deploy_vars.outputs.tag }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: aw-hpub-euw2-${{ matrix.environment }}-ecssvc-${{ env.APP_NAME }}
          cluster: aw-hpub-euw2-${{ matrix.environment }}-ecscluster
          wait-for-service-stability: true

      - name: Determine Base URL Prefix
        id: url
        run: |
          case "${{ matrix.environment }}" in
            prd|prod) prefix="hpub" ;;
            uat)      prefix="hpub-uat" ;;
            preprod)  prefix="hpubpp" ;;
            test)     prefix="hpub-test" ;;
            dev)      prefix="hpub-dev" ;;
            *)        echo "Unknown env"; exit 1 ;;
          esac
          echo "prefix=$prefix" >> $GITHUB_OUTPUT

      - name: End-to-end tests
        if: ${{ matrix.environment != 'prod' && matrix.environment != 'preprod' }}
        run: echo "npx playwright test --url https://${{ steps.url.outputs.prefix }}.test-and-trace.nhs.uk"

      - name: Post-Deployment Smoke Test
        if: ${{ matrix.environment != 'prod' && matrix.environment != 'preprod' }}
        run: |
          response=$(curl -H "user-agent: Mozilla/5.0 (compatible; PostDeploymentHealthCheck)" -s -o /dev/null -w "%{http_code}" https://${{ steps.url.outputs.prefix }}.test-and-trace.nhs.uk/)
          if [ "$response" -ne 200 ]; then
            echo "Post-Deployment tests failed with status $response"
            exit 1
          fi
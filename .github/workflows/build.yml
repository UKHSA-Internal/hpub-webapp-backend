name: "Build, Test and Release"

on:
  pull_request:
  push:
    branches: ["main","prod"]

permissions:
  id-token: write
  contents: write
  actions: read

env:
  APP_NAME: ${{ vars.APP_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_NAMESPACE: ${{ vars.ECR_NAMESPACE }}
  RUN_UNIT_TESTS: ${{ vars.RUN_UNIT_TESTS }}

jobs:
  build:
    name: Build and test container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    # Currently pushes to dev but should change to push to prod when account is set up.
    # Even further on, this should push to a centralised ECR registry.
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: ${{ env.RUN_UNIT_TESTS == 'true' }}
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Unit tests
        if: ${{ env.RUN_UNIT_TESTS == 'true' }}
        run: |
          cd health_pubs
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: build-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Get latest GitHub release
        id: latest_release
        run: |
          LATEST_RELEASE_TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/UKHSA-Internal/hpub-webapp-backend/releases/latest \
            | jq -r '.tag_name')

          VERSION_NUMBER=${LATEST_RELEASE_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NUMBER"
          PATCH=$((PATCH + 1))

          EXISTING_HOTFIXES=$(git fetch --tags && git tag -l "v${MAJOR}.${MINOR}.${PATCH}-hotfix*")
          COUNT=$(echo "$EXISTING_HOTFIXES" | wc -l)
          HOTFIX_NUMBER=$((COUNT + 1))
          HOTFIX_TAG="v${MAJOR}.${MINOR}.${PATCH}-hotfix${HOTFIX_NUMBER}"
          echo "HOTFIX_TAG=$HOTFIX_TAG" >> $GITHUB_ENV
          echo "Latest release: $LATEST_RELEASE_TAG"
          echo "New hotfix tag: $HOTFIX_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build container image
        uses: docker/build-push-action@v6
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }},${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:latest
          cache-to: type=inline

  release:
    name: Tag and release container image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    permissions:
      contents: write
      id-token: write
      actions: read
    needs:
      - build
    outputs:
      release_tag: ${{ steps.tag_bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: ukhsa-collaboration/devops-github-actions/.github/actions/github-bump-tag@v0.8.0
        id: tag_bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # AWS_ACCOUNT_ID_ECR_REGISTRY is used for pulling from a shared ECR repository
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_ECR_REGISTRY }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: retag-image-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull, retag, and push Application image for release
        id: push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker pull $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$IMAGE_TAG $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:${{ steps.tag_bump.outputs.new_tag }}
          docker push $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:${{ steps.tag_bump.outputs.new_tag }}
  
  release-hotfix:
    name: Tag and release container image main
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/prod') && contains(github.event.head_commit.message, 'hpub-hotfix/')
    permissions:
      contents: write
      id-token: write
      actions: read
    needs:
      - build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      
      - name: Get latest GitHub release
        id: latest_release
        run: |
          LATEST_RELEASE_TAG=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/latest \
            | jq -r '.tag_name')

          VERSION_NUMBER=${LATEST_RELEASE_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NUMBER"
          PATCH=$((PATCH + 1))

          EXISTING_HOTFIXES=$(git fetch --tags && git tag -l "v${MAJOR}.${MINOR}.${PATCH}-hotfix*")
          COUNT=$(echo "$EXISTING_HOTFIXES" | wc -l)
          HOTFIX_NUMBER=$((COUNT + 1))
          HOTFIX_TAG="v${MAJOR}.${MINOR}.${PATCH}-hotfix${HOTFIX_NUMBER}"
          echo "HOTFIX_TAG=$HOTFIX_TAG" >> $GITHUB_ENV
          echo "Latest release: $LATEST_RELEASE_TAG"
          echo "New hotfix tag: $HOTFIX_TAG"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # AWS_ACCOUNT_ID_ECR_REGISTRY is used for pulling from a shared ECR repository
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_ECR_REGISTRY }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: retag-image-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull, retag, and push Application image for release
        id: push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker pull $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$IMAGE_TAG $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$HOTFIX_TAG
          docker push $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$HOTFIX_TAG

  deploy_to_nonprod:
    name: Deploy build to ${{ matrix.environment }}
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    strategy:
      max-parallel: 1
      matrix:
        environment: ["dev", "test",]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      id-token: write
      actions: read
    needs:
      - release
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Parameter Store with new value
        env:
          NEW_TAG: ${{ needs.release.outputs.release_tag }}
        run: |
          aws ssm put-parameter --name "/hpub/$APP_NAME/image_tag" --type "String" --value "$NEW_TAG" --overwrite

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition aw-hpub-euw2-${{ matrix.environment }}-ecssvc-$APP_NAME --query taskDefinition > task-definition.json

      - name: Modify Amazon ECS task definition with updated image URI
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: app
          # We have to construct this as Github Actions will refuse to pass the full URL from 'release' step as it contains an AWS account ID
          image: ${{ secrets.AWS_ACCOUNT_ID_ECR_REGISTRY }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:${{ needs.release.outputs.release_tag }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: aw-hpub-euw2-${{ matrix.environment }}-ecssvc-${{ env.APP_NAME }}
          cluster: aw-hpub-euw2-${{ matrix.environment }}-ecscluster
          wait-for-service-stability: true

      - name: Determine Base URL
        id: url
        env:
          environment: ${{ matrix.environment }}
        run: |
          if [ "$environment" == "prd" ]; then
            prefix=hpub
          elif [ "$environment" == "preprod" ]; then
            prefix=hpubpp
          elif [ "$environment" == "prod" ]; then
            prefix=hpub
          elif [ "$environment" == "uat" ]; then
            prefix=hpub-uat
          elif [ "$environment" == "test" ]; then
            prefix=hpub-test
          elif [ "$environment" == "dev" ]; then
            prefix=hpub-dev
          else
            echo "Unknown environment. Unable to run tests."
            exit 1
          fi
          echo prefix=$prefix >> $GITHUB_OUTPUT

      - name: End-to-end tests
        if: ${{ matrix.environment != 'prod' && matrix.environment != 'preprod' }}
        env:
          BASE_URL: "https://${{ steps.url.outputs.prefix }}.test-and-trace.nhs.uk"
        run: |
          # No end-to-end testing in place yet
          echo npx playwright test

      - name: Post-Deployment Smoke Test
        if: ${{ matrix.environment != 'prod' && matrix.environment != 'preprod' }}
        env:
          environment_prefix: ${{ steps.url.outputs.prefix }}
        shell: bash
        run: |
          response=$(curl -H "user-agent: Mozilla/5.0 (compatible; PostDeploymentHealthCheck)" -s -o /dev/null -w "%{http_code}" https://$environment_prefix.test-and-trace.nhs.uk/api/v1/health/)
          if [ "$response" -ne 200 ]; then
            echo "Post-Deployment tests failed!"
            exit 1
          fi

name: "Deploy and Release to PreProd and Prod"

on:
  release:
    types: [published]

env:
  APP_NAME: ${{ vars.APP_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_NAMESPACE: ${{ vars.ECR_NAMESPACE }}
  RUN_UNIT_TESTS: ${{ vars.RUN_UNIT_TESTS }}

jobs:
  deploy_to_prod:
    name: Deploy build to ${{ matrix.environment }}
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    strategy:
      max-parallel: 1
      matrix:
        environment: ["prod"]
    permissions:
      contents: write
      id-token: write
      actions: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Get Release Tag
        run: echo "Release tag is ${{ github.event.release.tag_name }}"

      - name: Update Parameter Store with new value
        env:
          NEW_TAG: ${{ matrix.environment }}-${{ github.event.release.tag_name }}
        run: |
          aws ssm put-parameter --name "/hpub/$APP_NAME/image_tag" --type "String" --value "$NEW_TAG" --overwrite

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition aw-hpub-euw2-${{ matrix.environment }}-ecssvc-$APP_NAME --query taskDefinition > task-definition.json

      - name: Modify Amazon ECS task definition with updated image URI
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@06472d439cb66af6210a6709bfc842c26b053706 # v1
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ secrets.AWS_ACCOUNT_ID_ECR_REGISTRY }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:${{ matrix.environment }}-${{ github.event.release.tag_name }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@c6e19c08506099e50400581201a3a767fd8e3ff4 # v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: aw-hpub-euw2-${{ matrix.environment }}-ecssvc-${{ env.APP_NAME }}
          cluster: aw-hpub-euw2-${{ matrix.environment }}-ecscluster
          wait-for-service-stability: true

      # Post-deployment steps for Prod environment to tag deployed image as latest
      - name: Login to Amazon ECR
        if: matrix.environment == 'prod'
        id: login-ecr-prod
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2

      - name: Tag and push latest for Prod
        if: matrix.environment == 'prod'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr-prod.outputs.registry }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # Pull the deployed prod image
          docker pull $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:prod-$RELEASE_TAG
          
          # Tag as latest and push
          docker tag $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:prod-$RELEASE_TAG $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:latest
          docker push $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:latest


      - name: Determine Base URL
        id: url
        env:
          environment: ${{ matrix.environment }}
        run: |
          case "$environment" in
            prd|prod)
              prefix="hpub"
              ;;
            preprod)
              prefix="hpubpp"
              ;;
            uat)
              prefix="hpub-uat"
              ;;
            test)
              prefix="hpub-test"
              ;;
            dev)
              prefix="hpub-dev"
              ;;
            *)
              echo "Unknown environment: $environment. Unable to run tests."
              exit 1
              ;;
          esac

          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"

      - name: End-to-end tests
        if: ${{ matrix.environment != 'prod' }}
        env:
          BASE_URL: "https://${{ steps.url.outputs.prefix }}.test-and-trace.nhs.uk"
        run: |
          # No end-to-end testing in place yet
          echo npx playwright test

      - name: Post-Deployment Smoke Test
        if: ${{ matrix.environment != 'prod' }}
        env:
          environment_prefix: ${{ steps.url.outputs.prefix }}
        shell: bash
        run: |
          response=$(curl -H "user-agent: Mozilla/5.0 (compatible; PostDeploymentHealthCheck)" -s -o /dev/null -w "%{http_code}" https://$environment_prefix.test-and-trace.nhs.uk/)
          if [ "$response" -ne 200 ]; then
            echo "Post-Deployment tests failed!"
            exit 1
          fi

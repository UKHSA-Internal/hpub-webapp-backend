name: Build, Release & Deploy

on:
  pull_request:
  push:
    branches:
      - "develop"
      - "main"
env:
  APP_NAME: ${{ vars.APP_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_NAMESPACE: ${{ vars.ECR_NAMESPACE }}
  RUN_UNIT_TESTS: ${{ vars.RUN_UNIT_TESTS }}

jobs:
  build:
    name: Build and test container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    environment: dev
    outputs:
      image_digest: ${{ steps.build-docker-image.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        if: ${{ env.RUN_UNIT_TESTS == 'true' }}
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: health_pubs/requirements.txt
        
      - name: Install dependencies
        if: ${{ env.RUN_UNIT_TESTS == 'true' }}
        working-directory: health_pubs
        run: pip install -r requirements.txt

      - name: Unit tests
        if: ${{ env.RUN_UNIT_TESTS == 'true' }}
        working-directory: health_pubs
        run: pytest


      - name: Lint with Black
        working-directory: health_pubs
        continue-on-error: true
        run: |
          pip install black
          black --check --diff .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: build-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2

      - name: Build container image
        id: build-docker-image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          context: .
          push: ${{ (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main') && github.event_name == 'push' }}
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:latest
          cache-to: type=inline
  
  deploy_to_nonprod:
    name: Deploy build to dev & test 
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    strategy:
      max-parallel: 1
      matrix:
        environment: ["dev", "test"]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      contents: write
      id-token: write
      actions: read
    needs:
      - build
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update Parameter Store with new value
        env:
          COMMIT_HASH: ${{ github.sha }}
        run: |
          aws ssm put-parameter --name "/hpub/$APP_NAME/image_tag" --type "String" --value "$COMMIT_HASH" --overwrite

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition aw-hpub-euw2-${{ matrix.environment }}-ecssvc-$APP_NAME --query taskDefinition > task-definition.json

      - name: Modify Amazon ECS task definition with updated image URI
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@77954e213ba1f9f9cb016b86a1d4f6fcdea0d57e # v1
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID_ECR_REGISTRY }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          COMMIT_HASH: ${{ github.sha }}
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}@${{ needs.build.outputs.image_digest }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@fc8fc60f3a60ffd500fcb13b209c59d221ac8c8c # v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: aw-hpub-euw2-${{ matrix.environment }}-ecssvc-${{ env.APP_NAME }}
          cluster: aw-hpub-euw2-${{ matrix.environment }}-ecscluster
          wait-for-service-stability: true

      - name: End-to-end tests
        env:
          BASE_URL: "${{ vars.FPHR_BASE_URL }}"
        run: |
          # No end-to-end testing in place yet
          echo npx playwright test

      - name: Post-Deployment Smoke Test
        shell: bash
        run: |
          response=$(curl -H "user-agent: Mozilla/5.0 (compatible; PostDeploymentHealthCheck)" -s -o /dev/null -w "%{http_code}" ${{ vars.FPHR_BASE_URL }}/api/v1/health/)
          if [ "$response" -ne 200 ]; then
            echo "Post-Deployment tests failed!"
            exit 1
          fi

  release:
    name: Tag and release container image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    permissions:
      contents: write
      id-token: write
      actions: read
    needs:
      - build
    outputs:
      release_tag: ${{ steps.tag_bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # git release
      - uses: ukhsa-collaboration/devops-github-actions/.github/actions/github-bump-tag@ea0aa2a80fccfb2a19e1c71443a0a60b85f618a8 # v0.11.0
        id: tag_bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_ECR_REGISTRY }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: retag-image-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr-release
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2

      # docker pull + tag + push
      - name: Pull, retag, and push Application image for release (with env name)
        id: push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr-release.outputs.registry }}
          COMMIT_HASH: ${{ github.sha }}
        run: |
          docker pull $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$COMMIT_HASH

          # Tag and push environment-specific tags
          ENVIRONMENTS="uat preprod"
          for env in $ENVIRONMENTS; do
            docker tag $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:$COMMIT_HASH $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:${env}-${{ steps.tag_bump.outputs.new_tag }}
            docker push $ECR_REGISTRY/$ECR_NAMESPACE/$APP_NAME:${env}-${{ steps.tag_bump.outputs.new_tag }}
          done


  deploy_uat_preprod:
    name: Deploy build to ${{ matrix.environment }}
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    strategy:
      max-parallel: 1
      matrix:
        environment: ["preprod", "uat"]
    needs:
      - build
      - release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.release.result == 'success'
    permissions:
      contents: write
      id-token: write
      actions: read
    steps:
      - name: Get release tag
        id: get_tag
        run: |
          TAG="${{ needs.release.outputs.release_tag }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}
          
      - name: Update Parameter Store with new value
        env:
          NEW_TAG: ${{ matrix.environment }}-${{ steps.get_tag.outputs.tag }}
        run: |
          aws ssm put-parameter --name "/hpub/$APP_NAME/image_tag" --type "String" --value "$NEW_TAG" --overwrite

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition aw-hpub-euw2-${{ matrix.environment }}-ecssvc-$APP_NAME --query taskDefinition > task-definition.json

      - name: Modify Amazon ECS task definition with updated image URI
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@77954e213ba1f9f9cb016b86a1d4f6fcdea0d57e # v1
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID_ECR_REGISTRY }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          NEW_TAG: ${{ matrix.environment }}-${{ steps.get_tag.outputs.tag }}
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}@${{ needs.build.outputs.image_digest }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@fc8fc60f3a60ffd500fcb13b209c59d221ac8c8c # v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: aw-hpub-euw2-${{ matrix.environment }}-ecssvc-${{ env.APP_NAME }}
          cluster: aw-hpub-euw2-${{ matrix.environment }}-ecscluster
          wait-for-service-stability: true

      - name: End-to-end tests
        if: ${{ matrix.environment != 'prod' && matrix.environment != 'preprod' }}
        env:
          BASE_URL: "${{ vars.FPHR_BASE_URL }}"
        run: |
          # No end-to-end testing in place yet
          echo npx playwright test

      - name: Post-Deployment Smoke Test
        if: ${{ matrix.environment != 'prod' && matrix.environment != 'preprod' }}
        shell: bash
        run: |
          response=$(curl -H "user-agent: Mozilla/5.0 (compatible; PostDeploymentHealthCheck)" -s -o /dev/null -w "%{http_code}" ${{ vars.FPHR_BASE_URL }}/api/v1/health/)
          if [ "$response" -ne 200 ]; then
            echo "Post-Deployment tests failed!"
            exit 1
          fi

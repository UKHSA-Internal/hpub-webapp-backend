name: Update User role

on:
  pull_request:
    types: [opened, synchronize]  # Trigger on PR creation or update

  workflow_dispatch:  # This enables manual triggering
    inputs:
      email:
        description: "User email address"
        required: true
        type: string

permissions:
  id-token: write
  contents: write
  actions: read

env:
  APP_NAME: ${{ vars.APP_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_NAMESPACE: ${{ vars.ECR_NAMESPACE }}
  RUN_UNIT_TESTS: ${{ vars.RUN_UNIT_TESTS }}

jobs:
  update-role:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: build-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Get Latest Task Definition
        id: get-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs list-task-definitions --family-prefix aw-hpub-euw2-dev-ecssvc-$APP_NAME --sort DESC --query 'taskDefinitionArns[0]' --output text)
          echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV


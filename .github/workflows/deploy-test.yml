name: "Deploy (TEST)"

on:
  # Auto-deploy when upstream workflows complete successfully
  workflow_run:
    workflows:
      - "Build and Test"
      - "Create Release Tag and Retag Images"
    types: [completed]

  # Optional: manual promotion / redeploy
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy (dev|test|uat|preprod)"
        required: true
        default: "dev"
      image_tag:
        description: "Image tag to deploy (SHA or env-version like uat-v1.2.3). Leave empty to auto-resolve."
        required: false

permissions:
  id-token: write
  contents: read
  actions: read

env:
  APP_NAME: ${{ vars.APP_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_NAMESPACE: ${{ vars.ECR_NAMESPACE }}

jobs:

  ######################################################################
  # 1) Deploy to dev/test after successful Build run on main push
  ######################################################################
  deploy_nonprod:
    name: Deploy to ${{ matrix.environment }} (from build SHA)
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Build and Test' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main-ramon'
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    concurrency:
      group: deploy-${{ matrix.environment }}
      cancel-in-progress: false
    strategy:
      max-parallel: 1
      matrix:
        environment: [dev, test]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-${{ github.event.workflow_run.head_sha }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Parameter Store with image SHA
        env:
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          aws ssm put-parameter \
            --name "/hpub/$APP_NAME/image_tag" \
            --type "String" \
            --value "$COMMIT_SHA" \
            --overwrite

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition aw-hpub-euw2-${{ matrix.environment }}-ecssvc-$APP_NAME \
            --query taskDefinition > task-definition.json

      - name: Modify ECS task definition with image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID_ECR_REGISTRY }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:${{ env.COMMIT_SHA }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: aw-hpub-euw2-${{ matrix.environment }}-ecssvc-${{ env.APP_NAME }}
          cluster: aw-hpub-euw2-${{ matrix.environment }}-ecscluster
          wait-for-service-stability: true

      - name: Determine Base URL
        id: url
        env:
          environment: ${{ matrix.environment }}
        run: |
          if [ "$environment" == "dev" ]; then
            prefix=hpub-dev
          elif [ "$environment" == "test" ]; then
            prefix=hpub-test
          else
            echo "Unknown environment. Unable to run tests."
            exit 1
          fi
          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"

      - name: Post-Deployment Smoke Test
        env:
          environment_prefix: ${{ steps.url.outputs.prefix }}
        shell: bash
        run: |
          response=$(curl -H "user-agent: Mozilla/5.0 (compatible; PostDeploymentHealthCheck)" -s -o /dev/null -w "%{http_code}" "https://$environment_prefix.test-and-trace.nhs.uk/api/v1/health/")
          if [ "$response" -ne 200 ]; then
            echo "Post-Deployment tests failed!"
            exit 1
          fi

  ######################################################################
  # 2) Deploy to uat/preprod after Release workflow creates version tag
  ######################################################################
  deploy_qa:
    name: Deploy to ${{ matrix.environment }} (from release tag)
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.name == 'Create Release Tag and Retag Images' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'production-ramon'
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment }}
    concurrency:
      group: deploy-${{ matrix.environment }}
      cancel-in-progress: false
    strategy:
      max-parallel: 1
      matrix:
        environment: [uat, preprod]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag that points at the release commit
        id: get_tag
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git fetch --tags --force
          # get the first tag that points to the release commit
          TAG=$(git tag --points-at "$SHA" | head -n1)
          if [ -z "$TAG" ]; then
            # Fallback: nearest annotated tag
            TAG=$(git describe --tags --abbrev=0 || true)
          fi
          if [ -z "$TAG" ]; then
            echo "Failed to resolve release tag for commit $SHA"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-${{ github.event.workflow_run.head_sha }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Parameter Store with env-specific release tag
        env:
          NEW_TAG: ${{ matrix.environment }}-${{ steps.get_tag.outputs.tag }}
        run: |
          aws ssm put-parameter \
            --name "/hpub/$APP_NAME/image_tag" \
            --type "String" \
            --value "$NEW_TAG" \
            --overwrite

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition aw-hpub-euw2-${{ matrix.environment }}-ecssvc-$APP_NAME \
            --query taskDefinition > task-definition.json

      - name: Modify ECS task definition with image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID_ECR_REGISTRY }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          NEW_TAG: ${{ matrix.environment }}-${{ steps.get_tag.outputs.tag }}
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:${{ env.NEW_TAG }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: aw-hpub-euw2-${{ matrix.environment }}-ecssvc-${{ env.APP_NAME }}
          cluster: aw-hpub-euw2-${{ matrix.environment }}-ecscluster
          wait-for-service-stability: true

      - name: Determine Base URL
        id: url
        env:
          environment: ${{ matrix.environment }}
        run: |
          if [ "$environment" == "uat" ]; then
            prefix=hpub-uat
          elif [ "$environment" == "preprod" ]; then
            prefix=hpub-preprod
          else
            echo "Unknown environment. Unable to run tests."
            exit 1
          fi
          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"

      - name: Post-Deployment Smoke Test
        env:
          environment_prefix: ${{ steps.url.outputs.prefix }}
        shell: bash
        run: |
          response=$(curl -H "user-agent: Mozilla/5.0 (compatible; PostDeploymentHealthCheck)" -s -o /dev/null -w "%{http_code}" "https://$environment_prefix.test-and-trace.nhs.uk/api/v1/health/")
          if [ "$response" -ne 200 ]; then
            echo "Post-Deployment tests failed!"
            exit 1
          fi

  ######################################################################
  # 3) Optional manual deploy (useful for hotfixes/retries)
  ######################################################################
  deploy_manual:
    name: Manual deploy to ${{ inputs.environment }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: deploy-manual-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Compute image tag
        id: compute_tag
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            echo "No image_tag provided. For dev/test supply a commit SHA; for uat/preprod supply env-version (e.g., uat-v1.2.3)."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update Parameter Store
        env:
          NEW_TAG: ${{ steps.compute_tag.outputs.tag }}
        run: |
          aws ssm put-parameter \
            --name "/hpub/$APP_NAME/image_tag" \
            --type "String" \
            --value "$NEW_TAG" \
            --overwrite

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition aw-hpub-euw2-${{ inputs.environment }}-ecssvc-$APP_NAME \
            --query taskDefinition > task-definition.json

      - name: Modify ECS task definition with image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID_ECR_REGISTRY }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          NEW_TAG: ${{ steps.compute_tag.outputs.tag }}
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}:${{ env.NEW_TAG }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: aw-hpub-euw2-${{ inputs.environment }}-ecssvc-${{ env.APP_NAME }}
          cluster: aw-hpub-euw2-${{ inputs.environment }}-ecscluster
          wait-for-service-stability: true
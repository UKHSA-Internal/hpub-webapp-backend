name: Ruff Check with ReviewDog

on:
  pull_request:

jobs:
  ruff-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Ruff
        run: pip install ruff

      - name: Set up ReviewDog
        uses: reviewdog/action-setup@v3
        with:
          tool: ruff
          version: latest

      - name: Run Ruff and Annotate PR
        run: ruff . --select F,E,BLK --format=json | reviewdog -f="ruff" -reporter=github-pr-check -fail-on-error=true
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Black Formatter Check with ReviewDog

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  black-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6

      - name: Set environment variables
        run: |
          echo "REPORTER=${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: '3.11'

      - name: Install Black
        run: pip install black==23.1.0

      - name: Run Black with ReviewDog
        uses: reviewdog/action-black@644053a260402bc4278a865906107bd8aef7fae8 # v3
        with:
          black_args: "--check"
          reporter: ${{ env.REPORTER }}
          filter_mode: 'nofilter'
          workdir: 'health_pubs'
          github_token: ${{ secrets.GITHUB_TOKEN }}

name: WIP Build & Test

on:
  pull_request:
  push:
    branches: ["main-ramon", "production-ramon"]

permissions:
  id-token: write
  contents: read
  actions: read

env:
  APP_NAME: ${{ vars.APP_NAME }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_NAMESPACE: ${{ vars.ECR_NAMESPACE }}
  RUN_UNIT_TESTS: ${{ vars.RUN_UNIT_TESTS }}

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: ${{ env.RUN_UNIT_TESTS == 'true' }}
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: health_pubs/requirements.txt

      - name: Install dependencies
        if: ${{ env.RUN_UNIT_TESTS == 'true' }}
        run: pip install -r requirements.txt
        working-directory: health_pubs

      - name: Run tests
        if: ${{ env.RUN_UNIT_TESTS == 'true' }}
        run: pytest
        working-directory: health_pubs

  build_and_push:
    name: Build & push image to ECR
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: build-${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076

      - name: Build & push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE: ${{ env.ECR_NAMESPACE }}/${{ env.APP_NAME }}
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-to: type=inline
